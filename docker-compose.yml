services:
  api:
    image: ghcr.io/mr-pixel-kg/mpxsandbox-api:latest
    restart: always
    expose:
      - 8080
    environment:
      CONFIG_PATH: /app/config.yml
      DOCKER_HOST: unix:///var/run/docker.sock
      DB_HOST: ${DB_HOST:-database}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-mrpix_sandbox}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-mrpix_sandbox}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      JWT_SECRET: ${JWT_SECRET}
      APP_URL: ${APP_URL:-https://${API_DOMAIN}}
      SANDBOX_URL_PREFIX: ${SANDBOX_URL_PREFIX:-sandbox-}
      SANDBOX_URL_SUFFIX: ${SANDBOX_URL_SUFFIX:-.zion.mr-pixel.de}
    volumes:
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
      - api_storage:/app/storage
    networks:
      - sandbox-network
      - internal
    depends_on:
      database:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=internal"
      - "traefik.http.routers.sandbox-api.entrypoints=websecure"
      - "traefik.http.routers.sandbox-api.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.sandbox-api.tls=true"
      - "traefik.http.routers.sandbox-api.tls.certresolver=production"

  web:
    image: ghcr.io/mr-pixel-kg/mpxsandbox-web:latest
    restart: always
    expose:
      - 80
    environment:
      WEB_API_URL: ${WEB_API_URL:-https://${API_DOMAIN}}
    networks:
      - sandbox-network
      - internal
    depends_on:
      api:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=internal"
      - "traefik.http.routers.sandbox-web.entrypoints=websecure"
      - "traefik.http.routers.sandbox-web.rule=Host(`${WEB_DOMAIN}`)"
      - "traefik.http.routers.sandbox-web.tls=true"
      - "traefik.http.routers.sandbox-web.tls.certresolver=production"

  database:
    image: postgres:17.4
    restart: always
    shm_size: 128mb
    volumes:
      - database_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER:-mrpix_sandbox}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-mrpix_sandbox}
    networks:
      - sandbox-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mrpix_sandbox} -d ${DB_NAME:-mrpix_sandbox}"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  sandbox-network:
    driver: bridge
  internal:
    external: true

volumes:
  database_data:
    driver: local
  api_storage:
    driver: local
