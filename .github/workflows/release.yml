name: Build & Push Docker Image

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Extract Git Tag
        id: get_tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build API Docker Image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/shopshredder-api:${{ env.TAG }} -f api/Dockerfile ./api
          docker tag ghcr.io/${{ github.repository_owner }}/shopshredder-api:${{ env.TAG }} ghcr.io/${{ github.repository_owner }}/shopshredder-api:latest

      - name: Build WEB Docker Image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/shopshredder-web:${{ env.TAG }} -f web/Dockerfile ./web
          docker tag ghcr.io/${{ github.repository_owner }}/shopshredder-web:${{ env.TAG }} ghcr.io/${{ github.repository_owner }}/shopshredder-web:latest

      - name: Push Docker Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/shopshredder-api:${{ env.TAG }}
          docker push ghcr.io/${{ github.repository_owner }}/shopshredder-api:latest
          docker push ghcr.io/${{ github.repository_owner }}/shopshredder-web:${{ env.TAG }}
          docker push ghcr.io/${{ github.repository_owner }}/shopshredder-web:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Deploy to Portainer
        uses: ./.github/actions/deploy-portainer
        with:
          webhook-url: ${{ secrets.PORTAINER_WEBHOOK_URL }}
          environment: production