logging:
  level: "info"
  format: "json"

server:
  port: 8080
  app_url: ""         # set via APP_URL env
  allowed_origins: [] # set via ALLOWED_ORIGINS env or override in local config

database:
  host: ""       # set via DB_HOST env
  port: 5432
  user: ""       # set via DB_USER env
  password: ""   # set via DB_PASSWORD env
  name: ""       # set via DB_NAME env
  sslmode: ""    # set via DB_SSLMODE env

auth:
  jwt_secret: ""  # set via JWT_SECRET env
  jwt_ttl_minutes: 480
  guest_jwt_ttl_minutes: 43200
  guest_cookie_name: "shopshredder_guest"

sandbox:
  url_prefix: ""    # set via SANDBOX_URL_PREFIX env
  url_suffix: ""    # set via SANDBOX_URL_SUFFIX env
  default_lifetime: 60
  max_lifetime: 1440
  cleanup_interval_seconds: 60
  internal_port: 80

docker:
  mode: "traefik"
  network: "internal"
  traefik_enable: true
  traefik_entrypoints: "websecure"
  traefik_certresolver: "production"
  traefik_middlewares: "sandbox-middleware@file,https-redirect@file"

storage:
  thumbnail_dir: "storage/thumbnails"

guard:
  max_total_sandboxes: 32
  max_sandboxes_per_ip: 5
  max_sandboxes_per_user: 10
